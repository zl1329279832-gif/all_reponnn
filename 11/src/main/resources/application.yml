server:
  port: 8080

spring:
  application:
    name: lab-requisition

  datasource:
    url: jdbc:h2:mem:labdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  sql:
    init:
      mode: always

logging:
  level:
    com.lab.requisition: DEBUG
    org.hibernate.SQL: INFO
