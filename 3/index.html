<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>十字路口交通 3D 可视化</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="status-bar" class="panel">
        <div><span class="label">tick</span><span id="tick-val">0</span></div>
        <div><span class="label">相位</span><span id="phase-val">-</span></div>
        <div><span class="label">状态</span><span id="state-val">运行</span></div>
        <div><span class="label">模式</span><span id="mode-val">实体</span></div>
        <div><span class="label">车辆</span><span id="car-val">0</span></div>
        <div><span class="label">选中</span><span id="sel-val">N_s</span></div>
      </div>
      <div id="minimap-wrap" class="panel">
        <canvas id="minimap" width="220" height="220"></canvas>
        <div class="mm-title">顶视小地图 · 点击进口道</div>
        <div id="mm-hit"></div>
      </div>
      <div id="chart-wrap" class="panel">
        <div class="chart-title" id="chart-title">选中方向最近 60 tick</div>
        <canvas id="chart" width="340" height="160"></canvas>
        <div class="chart-legend">
          <span class="dot d-through"></span>通过数
          <span class="dot d-queue"></span>排队长度
        </div>
      </div>
      <div id="tips" class="panel">
        <span><kbd>Space</kbd> 暂停</span>
        <span><kbd>1</kbd> 粒子</span>
        <span><kbd>2</kbd> 热力</span>
        <span><kbd>3</kbd> 线框</span>
        <span><kbd>Esc</kbd> 重置相机</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
