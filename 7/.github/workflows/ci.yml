name: CI - 核心验收测试

on:
  push:
    branches: [ main, master, dev ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master, dev ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'

env:
  QT_QPA_PLATFORM: offscreen
  QT_QPA_OFFSCREEN_NO_GLX: "1"
  PYTHONIOENCODING: utf-8

jobs:
  acceptance-test:
    name: 核心验收测试 (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        python-version: [ "3.9", "3.10", "3.11" ]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: 安装依赖 (PyQt6)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: 生成测试数据
        run: python generate_test_data.py

      - name: 运行核心验收测试 (21 项)
        run: python acceptance_test.py

      - name: 上传测试产物（失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-data-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            test_data/
            data/*.db
            backups/
          retention-days: 3
